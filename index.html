<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Documentação DQX - Exemplo Simples</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      min-height: 100vh;
      background-color: #f4f4f4;
    }

    aside {
      width: 220px;
      background-color: #2d2d2d;
      color: white;
      padding: 20px;
    }

    aside h2 {
      color: #ffa500;
    }

    aside a {
      display: block;
      margin-top: 10px;
      color: #ccc;
      text-decoration: none;
    }

    aside a:hover {
      color: #fff;
    }

    main {
      flex: 1;
      padding: 30px;
      background-color: white;
    }

    h1 {
      color: #333;
    }

    p {
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <aside>
    <h2>Menu</h2>
    <a href="#">Introdução</a>
    <a href="#">Instalação</a>
    <a href="#">Exemplos</a>
    <a href="#">Contato</a>
  </aside>

  <main>
    <h1>Bem-vindo à Documentação</h1>
    <p>Este é um exemplo simples de layout parecido com o site do DQX.</p>
    <p>Você pode adicionar mais seções, usar Markdown convertido ou até integrar frameworks modernos depois.</p>
  </main>
</body>
</html>
